<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkinCare AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="chatContainer">

    <!-- 🔥 Header -->
    <div class="header">
        <h2>🤖 SkinCare AI Chatbot</h2>
        <p>Your personal AI assistant for skincare 💆‍♀️</p>
    </div>

    <!-- 💬 Chat Area -->
    <div id="chatBox"></div>

    <!-- 🧹 Clear Button -->
    <div class="actions">
        <button onclick="clearChat()" class="clearBtn">Clear Chat</button>
    </div>

    <!-- ✍️ Input Area -->
    <div class="inputArea">
        <input type="text" id="userInput" placeholder="Describe your skin problem...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <!-- 🎓 Footer -->
    <div class="footer">
        <p> AI SkinCare Assistant</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
